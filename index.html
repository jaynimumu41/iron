<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>IRON · 鐵血訓練</title>
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IRON">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Oswald:wght@400;500;600;700&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0b; --bg2:#121214; --card:#17171a; --card2:#1d1d21;
  --line:#2a2a30; --txt:#f2f2f4; --mut:#8a8a94; --dim:#5a5a64;
  --red:#e6312f; --red2:#ff4b3e; --orange:#ff7a18; --amber:#ffb020;
  --green:#23c552; --blue:#3aa0ff;
  --grad:linear-gradient(135deg,#ff4b3e 0%,#ff7a18 100%);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;touch-action:manipulation}
button,.chk,.nm,.tcircle,.optbtn,.eqtog,.tab{-webkit-user-select:none;user-select:none}
html,body{height:100%}
body{
  background:var(--bg); color:var(--txt);
  font-family:"Noto Sans TC","Oswald",system-ui,sans-serif;
  font-weight:500; line-height:1.45;
  padding-bottom:96px;
  background-image:radial-gradient(900px 500px at 80% -10%,rgba(255,80,40,.10),transparent 60%),radial-gradient(700px 400px at -10% 10%,rgba(255,140,20,.06),transparent 55%);
  -webkit-font-smoothing:antialiased;
}
.eng{font-family:"Teko","Oswald",sans-serif}
.wrap{max-width:620px;margin:0 auto;padding:0 16px}

/* ---- header ---- */
header{padding:22px 0 10px}
.brand{display:flex;align-items:center;gap:12px}
.logo{
  width:46px;height:46px;border-radius:12px;background:var(--grad);
  display:grid;place-items:center;font-size:26px;
  box-shadow:0 8px 24px rgba(255,75,62,.35);transform:rotate(-3deg)
}
.brand h1{font-family:"Teko",sans-serif;font-size:42px;line-height:.9;letter-spacing:1px;font-weight:700}
.brand h1 small{display:block;font-family:"Noto Sans TC";font-size:11px;font-weight:700;letter-spacing:4px;color:var(--orange);margin-top:2px}
.tagline{color:var(--mut);font-size:13px;font-weight:700;margin-top:4px;letter-spacing:.5px}

/* ---- stats strip ---- */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 10px;text-align:center;position:relative;overflow:hidden}
.stat .num{font-family:"Teko",sans-serif;font-size:38px;line-height:1;font-weight:700}
.stat .num.fire{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.stat .lbl{font-size:11px;color:var(--mut);font-weight:700;letter-spacing:1px;margin-top:2px}
.stat .ico{position:absolute;top:8px;right:10px;font-size:14px;opacity:.5}

/* ---- tabs ---- */
.tabs{display:flex;gap:6px;margin:18px 0 8px;background:var(--bg2);padding:5px;border-radius:14px;border:1px solid var(--line)}
.tab{flex:1;text-align:center;padding:10px 4px;border-radius:10px;font-weight:900;font-size:14px;color:var(--mut);cursor:pointer;transition:.15s;letter-spacing:1px}
.tab.on{background:var(--grad);color:#fff;box-shadow:0 6px 16px rgba(255,75,62,.3)}

/* ---- day banner ---- */
.daybanner{margin-top:8px;border-radius:18px;padding:18px 18px 16px;position:relative;overflow:hidden;border:1px solid var(--line)}
.daybanner::before{content:"";position:absolute;inset:0;opacity:.16;background:var(--accent,var(--grad))}
.daybanner.rest::before{opacity:.10}
.db-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative}
.db-date{font-size:12px;font-weight:900;letter-spacing:2px;color:var(--txt);opacity:.85}
.db-title{font-family:"Teko",sans-serif;font-size:46px;line-height:.95;font-weight:700;margin-top:2px;position:relative}
.db-sub{font-size:13px;color:var(--txt);opacity:.8;font-weight:700;position:relative;margin-top:2px}
.db-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;position:relative}
.chip{font-size:11px;font-weight:900;letter-spacing:1px;padding:5px 10px;border-radius:20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)}
.chip.hot{background:var(--grad);border:none;color:#fff}
.db-badge{position:relative;font-size:30px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.5))}

/* progress bar on banner */
.dprog{margin-top:14px;position:relative}
.dprog .bar{height:8px;border-radius:6px;background:rgba(0,0,0,.4);overflow:hidden}
.dprog .fill{height:100%;width:0;background:var(--grad);transition:width .3s;border-radius:6px}
.dprog .meta{display:flex;justify-content:space-between;font-size:11px;font-weight:800;color:var(--txt);opacity:.8;margin-top:6px;letter-spacing:.5px}

/* ---- section label ---- */
.seclabel{display:flex;align-items:center;gap:10px;margin:22px 2px 12px}
.seclabel .ln{flex:1;height:2px;background:linear-gradient(90deg,var(--orange),transparent)}
.seclabel span{font-family:"Teko",sans-serif;font-size:24px;font-weight:700;letter-spacing:2px;color:var(--txt)}
.seclabel .em{font-size:18px}

/* ---- exercise card ---- */
.ex{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:11px;transition:.18s;position:relative;overflow:hidden}
.exrow{display:flex;gap:13px;align-items:flex-start}
.ex::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--grad);opacity:.0;transition:.18s}
.ex.done{opacity:.5}
.ex.done::before{opacity:1;background:var(--green)}
.ex .chk{flex:none;width:30px;height:30px;border-radius:9px;border:2px solid var(--line);display:grid;place-items:center;cursor:pointer;font-size:16px;color:transparent;transition:.15s;margin-top:2px;font-weight:900}
.ex.done .chk{background:var(--green);border-color:var(--green);color:#06210d}
.ex .body{flex:1;min-width:0}
.ex .nm{font-weight:900;font-size:16.5px;letter-spacing:.3px;cursor:pointer;display:flex;align-items:baseline;flex-wrap:wrap;gap:6px}
.ex.done .nm{text-decoration:line-through;text-decoration-color:var(--green)}
.howhint{font-size:10.5px;color:var(--orange);font-weight:800;letter-spacing:.5px;opacity:.8;text-decoration:none}
.ex.open .howhint{opacity:1}
.howto{max-height:0;overflow:hidden;opacity:0;transition:max-height .28s ease,opacity .25s,margin-top .28s,padding-top .28s}
.ex.open .howto{max-height:360px;opacity:1;margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)}
.howto p{font-size:13px;color:var(--mut);font-weight:600;line-height:1.65;margin:0 0 10px}
.ytlink{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--line);color:var(--red2);font-weight:800;font-size:12.5px;padding:7px 12px;border-radius:9px;text-decoration:none}
.ytlink:active{transform:scale(.97)}
.ex .en{font-family:"Oswald";font-size:11px;color:var(--dim);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.ex .scheme{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}
.pill{font-size:12px;font-weight:800;padding:4px 9px;border-radius:8px;background:var(--card2);border:1px solid var(--line);color:var(--txt);display:flex;align-items:center;gap:4px}
.pill b{font-family:"Teko";font-size:17px;color:var(--orange);font-weight:700;line-height:1}
.pill .k{color:var(--mut);font-size:10px;font-weight:800}
.ex .equip{font-size:11px;color:var(--mut);font-weight:700;margin-top:8px}
.ex .equip .e{display:inline-block;background:var(--bg2);border:1px solid var(--line);padding:2px 7px;border-radius:6px;margin-right:5px}
.timerbtn{flex:none;align-self:center;background:var(--card2);border:1px solid var(--line);color:var(--amber);font-weight:900;font-size:11px;padding:8px 9px;border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;letter-spacing:.5px}
.timerbtn .t{font-family:"Teko";font-size:18px;color:var(--txt);line-height:1}

/* tip box */
.tip{background:linear-gradient(135deg,rgba(255,122,24,.10),rgba(255,75,62,.06));border:1px solid rgba(255,122,24,.25);border-radius:14px;padding:13px 15px;font-size:13px;color:#ffd8b0;font-weight:700;display:flex;gap:10px;line-height:1.5}
.tip .i{font-size:18px;flex:none}

/* big buttons */
.btn{display:block;width:100%;padding:16px;border:none;border-radius:16px;font-family:"Teko",sans-serif;font-size:26px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:.15s;text-align:center}
.btn.go{background:var(--grad);color:#fff;box-shadow:0 10px 30px rgba(255,75,62,.35)}
.btn.go:active{transform:scale(.98)}
.btn.done{background:var(--green);color:#06210d}
.btn.ghost{background:transparent;border:2px solid var(--line);color:var(--mut);font-size:18px;padding:12px}
.actions{margin-top:18px;display:flex;flex-direction:column;gap:10px}

/* ---- week view ---- */
.wkrow{display:flex;gap:11px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:9px;cursor:pointer;transition:.15s}
.wkrow.today{border-color:var(--orange);background:linear-gradient(135deg,rgba(255,122,24,.10),var(--card))}
.wkrow .wd{flex:none;width:46px;text-align:center}
.wkrow .wd .d{font-family:"Teko";font-size:30px;font-weight:700;line-height:1}
.wkrow .wd .w{font-size:10px;color:var(--mut);font-weight:800;letter-spacing:1px}
.wkrow.today .wd .d{color:var(--orange)}
.wkrow .ic{font-size:24px;flex:none}
.wkrow .info{flex:1;min-width:0}
.wkrow .info .t{font-weight:900;font-size:16px}
.wkrow .info .s{font-size:12px;color:var(--mut);font-weight:700}
.wkrow .st{flex:none;font-size:20px}
.wkrow .focus{font-size:10px;font-weight:900;letter-spacing:1px;padding:3px 8px;border-radius:20px;color:#fff;flex:none}

/* ---- settings ---- */
.setcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px}
.setcard h3{font-family:"Teko";font-size:24px;font-weight:700;letter-spacing:1px;margin-bottom:4px}
.setcard p.d{font-size:12px;color:var(--mut);font-weight:700;margin-bottom:14px}
.equip-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.eqtog{display:flex;align-items:center;gap:11px;background:var(--bg2);border:2px solid var(--line);border-radius:13px;padding:12px;cursor:pointer;transition:.15s}
.eqtog.on{border-color:var(--orange);background:linear-gradient(135deg,rgba(255,122,24,.12),var(--bg2))}
.eqtog .em{font-size:26px;flex:none;filter:grayscale(1);opacity:.5;transition:.15s;color:var(--txt);display:inline-flex;align-items:center}
.eqtog.on .em{filter:none;opacity:1;color:var(--orange)}
.eqtog .nm{font-weight:900;font-size:15px}
.eqtog .sub{font-size:11px;color:var(--mut);font-weight:700}
.eqtog .sw{margin-left:auto;width:20px;height:20px;border-radius:6px;border:2px solid var(--line);display:grid;place-items:center;font-weight:900;color:transparent;flex:none}
.eqtog.on .sw{background:var(--orange);border-color:var(--orange);color:#1a0d00}

/* danger / reset */
.linkbtn{background:none;border:none;color:var(--dim);font-weight:800;font-size:13px;text-decoration:underline;cursor:pointer;padding:8px}

/* ---- timer modal ---- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(6px);display:none;place-items:center;z-index:50;padding:24px}
.overlay.show{display:grid}
.tmodal{text-align:center;width:100%;max-width:340px}
.tcircle{position:relative;width:240px;height:240px;margin:0 auto}
.tcircle svg{transform:rotate(-90deg)}
.tcircle .tnum{position:absolute;inset:0;display:grid;place-content:center;font-family:"Teko";font-size:80px;font-weight:700;line-height:1}
.tcircle .tlbl{position:absolute;left:0;right:0;bottom:46px;text-align:center;font-size:12px;letter-spacing:3px;color:var(--mut);font-weight:900}
.trow{display:flex;gap:10px;justify-content:center;margin-top:26px}
.tbtn{background:var(--card);border:1px solid var(--line);color:var(--txt);font-family:"Teko";font-size:22px;font-weight:700;padding:12px 22px;border-radius:14px;cursor:pointer;letter-spacing:1px}
.tbtn.main{background:var(--grad);border:none;color:#fff}
.tquick{display:flex;gap:8px;justify-content:center;margin-top:16px}
.tquick button{background:var(--bg2);border:1px solid var(--line);color:var(--mut);font-weight:800;padding:8px 12px;border-radius:10px;cursor:pointer;font-family:"Teko";font-size:18px}

/* 週日加練選單 */
.optgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:2px}
.optbtn{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;text-align:left;transition:.15s;display:flex;align-items:center;gap:11px}
.optbtn:active{transform:scale(.97)}
.optbtn.rec{border-color:var(--orange);background:linear-gradient(135deg,rgba(255,122,24,.12),var(--card))}
.optbtn .em{font-size:26px;flex:none}
.optbtn .nm{font-weight:900;font-size:15px}
.optbtn .sub{font-size:11px;color:var(--mut);font-weight:700;margin-top:1px}

.empty{text-align:center;color:var(--mut);padding:50px 20px;font-weight:700}
.empty .big{font-size:60px;margin-bottom:10px}
.foot{text-align:center;color:var(--dim);font-size:11px;font-weight:700;padding:26px 0 6px;letter-spacing:1px}
.hide{display:none!important}
.toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--orange);color:var(--txt);font-weight:900;padding:13px 22px;border-radius:30px;z-index:60;opacity:0;transition:.3s;pointer-events:none;font-size:14px;box-shadow:0 10px 30px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo">🔥</div>
      <div>
        <h1>IRON<small>鐵血訓練</small></h1>
      </div>
    </div>
    <div class="tagline" id="tagline">沒有藉口。今天就是練的一天。</div>

    <div class="stats">
      <div class="stat"><span class="ico">🔥</span><div class="num fire" id="stStreak">0</div><div class="lbl">連續天數</div></div>
      <div class="stat"><span class="ico">📅</span><div class="num" id="stWeek">0/6</div><div class="lbl">本週完成</div></div>
      <div class="stat"><span class="ico">🏆</span><div class="num" id="stTotal">0</div><div class="lbl">總訓練數</div></div>
    </div>

    <div class="tabs">
      <div class="tab on" data-tab="today">今日</div>
      <div class="tab" data-tab="week">本週菜單</div>
      <div class="tab" data-tab="set">設定</div>
    </div>
  </header>

  <main>
    <section id="view-today"></section>
    <section id="view-week" class="hide"></section>
    <section id="view-set" class="hide"></section>
  </main>

  <div class="foot">IRON · 把「隨便練」變成「按表操課」 💪</div>
</div>

<!-- timer -->
<div class="overlay" id="timerOv">
  <div class="tmodal">
    <div class="tcircle">
      <svg width="240" height="240">
        <circle cx="120" cy="120" r="108" stroke="#2a2a30" stroke-width="14" fill="none"/>
        <circle id="tArc" cx="120" cy="120" r="108" stroke="url(#g)" stroke-width="14" fill="none" stroke-linecap="round" stroke-dasharray="678.58" stroke-dashoffset="0"/>
        <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff4b3e"/><stop offset="1" stop-color="#ff7a18"/></linearGradient></defs>
      </svg>
      <div class="tnum" id="tNum">60</div>
      <div class="tlbl">休息 REST · 點圓圈開始/暫停</div>
    </div>
    <div class="tquick">
      <button data-add="-15">−15</button>
      <button data-add="15">+15</button>
      <button data-add="30">+30</button>
    </div>
    <div class="trow">
      <button class="tbtn" id="tReset">重設</button>
      <button class="tbtn main" id="tToggle">開始</button>
      <button class="tbtn" id="tClose">關閉</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   IRON · 鐵血訓練  —  每日訓練計畫產生器
   ============================================================ */
const WD = ["週日","週一","週二","週三","週四","週五","週六"];
const todayKey = (d=new Date())=> d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
const $ = s=>document.querySelector(s);

/* ---------- equipment ---------- */
const SVG = {
  kb:'<svg viewBox="0 0 24 24" width="1em" height="1em" style="vertical-align:-.15em"><path d="M8.5 9.5a3.5 3.5 0 1 1 7 0" fill="none" stroke="currentColor" stroke-width="2.2"/><path d="M7 9.6C5.8 10.8 5 12.6 5 14.6a7 7 0 0 0 14 0c0-2-.8-3.8-2-5-1 .8-2.4 1.2-5 1.2s-4-.4-5-1.2z" fill="currentColor"/></svg>',
  db:'<svg viewBox="0 0 24 24" width="1em" height="1em" style="vertical-align:-.15em" fill="currentColor"><path d="M3 9h2v6H3zM6 7h2v10H6zM8 10.5h8v3H8zM16 7h2v10h-2zM19 9h2v6h-2z"/></svg>',
  bb:'<svg viewBox="0 0 24 24" width="1em" height="1em" style="vertical-align:-.15em" fill="currentColor"><path d="M2 8h1.6v8H2zM4.2 6H6v12H4.2zM6 11h12v2H6zM18 6h1.8v12H18zM20.4 8H22v8h-1.6z"/></svg>',
  pull:'<svg viewBox="0 0 24 24" width="1em" height="1em" style="vertical-align:-.15em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 5h18M6 5v14M18 5v14M3.5 19h5M15.5 19h5"/></svg>',
  bench:'<svg viewBox="0 0 24 24" width="1em" height="1em" style="vertical-align:-.15em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 13h13M5 13l-1.5 5M14 13l1.5 5M18 13V6M20.5 13V6M17 6.5h5"/></svg>'
};
const EQUIP = {
  kb:   {nm:"壺鈴",  en:"Kettlebell", em:SVG.kb},
  bb:   {nm:"槓鈴",  en:"Barbell",    em:SVG.bb},
  db:   {nm:"啞鈴",  en:"Dumbbell",   em:SVG.db},
  pull: {nm:"單槓",  en:"Pull-up Bar",em:SVG.pull},
  bench:{nm:"握推椅",en:"Bench",      em:SVG.bench},
  body: {nm:"徒手",  en:"Bodyweight", em:"💪"}
};

/* ---------- exercise pools ----------
   need: 必要器材(全部都要有才會出現)。body 永遠可用。      */
const EX = {
  legSquat:[
    {nm:"槓鈴背蹲", en:"Back Squat",        need:["bb"]},
    {nm:"槓鈴前蹲", en:"Front Squat",       need:["bb"]},
    {nm:"高腳杯深蹲",en:"Goblet Squat",     need:["kb"]},
    {nm:"高腳杯深蹲",en:"Goblet Squat",     need:["db"]},
    {nm:"保加利亞分腿蹲",en:"Bulgarian Split Squat",need:["bench","db"]},
    {nm:"啞鈴箭步蹲",en:"Walking Lunge",    need:["db"]},
    {nm:"壺鈴箭步蹲",en:"KB Lunge",         need:["kb"]},
    {nm:"槓鈴箭步蹲",en:"Barbell Lunge",    need:["bb"]},
    {nm:"負重登階", en:"Weighted Step-up",  need:["bench","db"]},
    {nm:"徒手深蹲(慢離心)",en:"Tempo Air Squat",need:["body"]},
    {nm:"跳躍深蹲", en:"Jump Squat",        need:["body"]}
  ],
  legHinge:[
    {nm:"槓鈴硬舉", en:"Deadlift",          need:["bb"]},
    {nm:"羅馬尼亞硬舉",en:"Barbell RDL",    need:["bb"]},
    {nm:"啞鈴羅馬尼亞硬舉",en:"DB RDL",     need:["db"]},
    {nm:"壺鈴硬舉", en:"KB Deadlift",       need:["kb"]},
    {nm:"槓鈴臀推", en:"Hip Thrust",        need:["bb","bench"]},
    {nm:"早安式",   en:"Good Morning",      need:["bb"]},

/* ---------- 產生器 ---------- */
function weekNum(d){ const o=new Date(d); o.setHours(0,0,0,0); o.setDate(o.getDate()+4-(o.getDay()||7)); const y=new Date(o.getFullYear(),0,1); return Math.ceil(((o-y)/86400000+1)/7); }
function avail(ex){ return ex.need.every(n=>S.equip[n]); }

/* 這兩個池徒手動作本來就是主角(棒式/波比跳),不降級 */
const BODY_FIRST = {core:1, conditioning:1};
function rot(arr,seed){ if(arr.length<2)return arr.slice(); const k=seed%arr.length; return arr.slice(k).concat(arr.slice(0,k)); }
function pickUnique(poolName, n, seed, used){
  const all = (EX[poolName]||[]).filter(avail);
  let cands;
  if(BODY_FIRST[poolName]){ cands = rot(all,seed); }
  else {
    // 器材動作優先,徒手只當沒器材可用時的備案
    const tool = all.filter(ex=>ex.need.some(x=>x!=="body"));
    const body = all.filter(ex=>!ex.need.some(x=>x!=="body"));
    cands = rot(tool,seed).concat(rot(body,seed));
  }
  // 去掉同名(避免同一天出現重複動作)
  const out=[]; const seen=new Set(used);
  for(const ex of cands){
    if(seen.has(ex.nm)) continue;
    seen.add(ex.nm); out.push(ex);
    if(out.length>=n) break;
  }
  // 若不夠(器材太少)，允許重複名稱補滿
  let g=0;
  while(out.length<n && cands.length){ out.push(cands[(seed+g)%cands.length]); g++; if(g>20)break; }
  return out;
}

/* ---------- 週日加練選項 (預設休息，可自選練) ----------
   刻意不排腿：週六體能 / 週一腿，週日練腿會造成連續腿日，違反「同部位不連兩天」 */

const OPT_SEED = {pull:11,push:23,arms:31,cond:43,legs:53};

function buildWorkout(cfg, seed){
  const used=[]; const items=[];
  cfg.slots.forEach((slot,idx)=>{
    const picks = pickUnique(slot.pool, 1, seed+idx*3, used);
    const ex = picks[0];
    if(!ex){ return; }
    used.push(ex.nm);
    const r = ROLE[slot.role];
    items.push({
      nm:ex.nm, en:ex.en, need:ex.need, label:slot.label, role:slot.role,
      sets:r.sets, reps:r.reps, rest:r.rest,
      est: Math.round(r.sets*(r.rest+r.sw)/60)
    });
  });
  let est = items.reduce((a,b)=>a+b.est,0) + 6; // +暖身6分
  return {cfg,rest:false,items,est,circuit:!!cfg.circuit,seed};
}

function buildDay(date){
  const dow = date.getDay();
  const cfg = getSplit(dow);
  const key = todayKey(date);
  const opt = S.optTrain && S.optTrain[key];
  if(cfg.rest && !opt) return {dow,cfg,rest:true,items:[]};          // 純休息日
  if(cfg.rest && opt){                                                // 休息日→使用者選擇加練
    const ocfg = OPT[opt] || OPT.pull;
    return Object.assign({dow,optional:true,focus:opt}, buildWorkout(ocfg, weekNum(date)+(OPT_SEED[opt]||11)));
  }
  return Object.assign({dow}, buildWorkout(cfg, weekNum(date)+dow));  // 一般訓練日
}

function dayState(key){ return S.done[key] || {checks:{}, complete:false}; }
function setDayState(key,st){ S.done[key]=st; save(); }

/* streak: 往回數，連續每天 (休息日視為不中斷；訓練日需完成) */
function getStreak(){
  let s=0; const d=new Date();
  for(let i=0;i<400;i++){
    const k=todayKey(d); const dow=d.getDay();
    const opt = S.optTrain && S.optTrain[k];
    const isRest = getSplit(dow).rest && !opt;       // 有加練的週日視為訓練日
    const done = S.done[k] && S.done[k].complete;
    if(isRest){ d.setDate(d.getDate()-1); continue; } // 純休息日:不中斷、不加
    if(done){ s++; }                                  // 訓練日已完成 → +1
    else if(i===0){ /* 今天還沒完成 → 不中斷,繼續往回看 */ }
    else break;                                       // 過去的訓練日沒完成 → 斷
    d.setDate(d.getDate()-1);
  }
  return s;
}
function weekDone(){
  // 本週(週一起算)已完成的訓練日數
  const now=new Date(); const day=(now.getDay()+6)%7; // 0=Mon
  let c=0; const d=new Date(now); d.setDate(d.getDate()-day);
  for(let i=0;i<7;i++){ const k=todayKey(d); if(S.done[k]&&S.done[k].complete)c++; d.setDate(d.getDate()+1); }
  return c;
}

      <div class="wd"><div class="d">${d.getDate()}</div><div class="w">${WD[d.getDay()]}</div></div>
      <div class="ic">${cfg.icon}</div>
      <div class="info"><div class="t">${cfg.title}</div><div class="s">${cfg.sub}</div></div>
      ${cfg.rest?'':`<span class="focus" style="background:${cfg.color}">${cfg.tags[0]}</span>`}
      <div class="st">${cfg.rest?'😴':done?'✅':isToday?'🎯':'⬜'}</div>
    </div>`;
  }
  html+= S.mode==="legs"
    ? `<div class="tip" style="margin-top:16px"><span class="i">🦵</span><div><b>只練腿模式</b>：6 天全是腿，蹲系與後鏈交替、中間穿插單邊穩定，讓不同腿部肌群輪流恢復。覺得太操隨時可在設定切回標準分化。</div></div>`
    : `<div class="tip" style="margin-top:16px"><span class="i">🦵</span><div>本週排了 <b>${legCount} 天腿</b>（你的弱點重點加強）、推 2 天、拉 1 天、全身體能 1 天。同部位不會連兩天，給足恢復。</div></div>`;
  html+=`<div class="tip" style="margin-top:11px;background:linear-gradient(135deg,rgba(58,160,255,.1),rgba(35,197,82,.05));border-color:rgba(58,160,255,.25);color:#bfe0ff"><span class="i">📈</span><div>動作每週自動輪換，避免身體適應、持續進步。重量原則：能標準完成目標次數，下次就加一點。</div></div>`;
  v.innerHTML=html;
}

function renderSet(){
  const v=$("#view-set");
  let eq="";
  Object.keys(EQUIP).forEach(k=>{
    if(k==="body")return;
    const on=S.equip[k];
    eq+=`<div class="eqtog ${on?'on':''}" data-eq="${k}">
      <span class="em">${EQUIP[k].em}</span>
      <div><div class="nm">${EQUIP[k].nm}</div><div class="sub">${EQUIP[k].en}</div></div>
      <span class="sw">✓</span>
    </div>`;
  });
  const rules = S.mode==="legs"
    ? `🦵 每天都是腿：蹲系 / 後鏈 / 單邊交替<br>
       ⏱ 每日 30–60 分鐘<br>
       📅 週一蹲 / 週二後鏈 / 週三單邊 / 週四蹲 / 週五後鏈 / 週六腿體能 / 週日休<br>
       🔀 動作每週自動輪換`
    : `🦵 腿每週 3 天（弱點加強）<br>
       🔁 同部位不連兩天，確保恢復<br>
       ⏱ 每日 30–60 分鐘<br>
       📅 週一腿 / 週二推 / 週三拉 / 週四腿 / 週五肩臂 / 週六體能 / 週日休<br>
       🔀 動作每週自動輪換`;
  v.innerHTML=`
    <div class="seclabel"><span class="em">🛠</span><span>訓練設定</span><div class="ln"></div></div>
    <div class="setcard">
      <h3>訓練模式</h3><p class="d">只想練腿？切到「只練腿」，整週菜單都是腿。</p>
      <div class="equip-grid">
        <div class="eqtog ${S.mode!=="legs"?'on':''}" data-mode="std"><span class="em">🏋️</span><div><div class="nm">標準分化</div><div class="sub">推拉腿全面練</div></div><span class="sw">✓</span></div>
        <div class="eqtog ${S.mode==="legs"?'on':''}" data-mode="legs"><span class="em">🦵</span><div><div class="nm">只練腿</div><div class="sub">每天都是腿日</div></div><span class="sw">✓</span></div>
      </div>
    </div>
    <div class="setcard">
      <h3>裝備庫</h3><p class="d">關掉沒有的器材，菜單會自動換成你做得到的動作。徒手永遠可用。</p>
      <div class="equip-grid">${eq}</div>
    </div>
    <div class="setcard">
      <h3>訓練規則</h3>
      <div style="font-size:13px;color:var(--mut);font-weight:700;line-height:1.9">${rules}</div>
    </div>
    <div class="setcard">
      <h3>數據</h3>
      <p class="d">總完成 ${S.total||0} 次訓練 · 連續 ${getStreak()} 天</p>
      <button class="linkbtn" id="resetAll">⚠️ 清除所有紀錄</button>
    </div>`;
}

/* ---------- 事件 ---------- */
function renderAll(){ renderStats(); renderToday(); renderWeek(); renderSet(); }

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on");
  ["today","week","set"].forEach(n=>$("#view-"+n).classList.toggle("hide",n!==t.dataset.tab));
});

document.addEventListener("click",e=>{
  // 展開/收合 動作說明
  const how=e.target.closest("[data-how]");
  if(how){ how.closest(".ex").classList.toggle("open"); return; }
  // 勾選動作
  const chk=e.target.closest("[data-chk]");
  if(chk){
    const i=+chk.dataset.chk; const key=todayKey();
    const st=dayState(key); st.checks[i]=!st.checks[i];
    // 全勾自動標記完成? 不自動,讓使用者按收工。但更新顯示
    setDayState(key,st); renderToday(); renderStats();
    return;
  }
  // 計時器
  const tb=e.target.closest("[data-timer]");
  if(tb){ openTimer(+tb.dataset.timer); return; }
  // 完成今日
  if(e.target.id==="completeBtn"){
    const key=todayKey(); const st=dayState(key);
    if(st.complete){ st.complete=false; S.total=Math.max(0,(S.total||0)-1); }
    else { st.complete=true; S.total=(S.total||0)+1; toast("🏆 收工！強了一點點"); }
    setDayState(key,st); renderAll();
    return;
  }
  if(e.target.id==="resetDayBtn"){
    const key=todayKey(); const st=dayState(key); st.checks={};
    if(st.complete){st.complete=false;S.total=Math.max(0,(S.total||0)-1);}
    setDayState(key,st); renderAll(); return;
  }
  // 週日加練:選擇部位
  const optb=e.target.closest("[data-opt]");
  if(optb){
    const key=todayKey(); if(!S.optTrain)S.optTrain={};
    S.optTrain[key]=optb.dataset.opt; save();
    renderAll(); toast("🔥 加練菜單已排好，拼了！"); window.scrollTo({top:0,behavior:'smooth'}); return;
  }
  // 週日加練:改回休息
  if(e.target.id==="revertRestBtn"){
    const key=todayKey();
    if(S.done[key]&&S.done[key].complete){ S.total=Math.max(0,(S.total||0)-1); }
    delete S.done[key]; if(S.optTrain) delete S.optTrain[key];
    save(); renderAll(); toast("已改回休息日"); window.scrollTo({top:0,behavior:'smooth'}); return;
  }
  // 訓練模式切換
  const md=e.target.closest("[data-mode]");
  if(md){ S.mode=md.dataset.mode; save(); renderAll(); toast(S.mode==="legs"?"🦵 只練腿模式：每天都是腿日":"已切回標準分化"); return; }
  // 器材切換
  const eq=e.target.closest("[data-eq]");
  if(eq){ const k=eq.dataset.eq; S.equip[k]=S.equip[k]?0:1; save(); renderSet(); renderToday(); renderWeek(); toast("菜單已依器材更新"); return; }
  // 週列表→跳今日(同一天)
  const wr=e.target.closest("[data-goday]");
  if(wr){ document.querySelector('.tab[data-tab="today"]').click(); window.scrollTo({top:0,behavior:'smooth'}); return; }
  if(e.target.id==="resetAll"){
    if(confirm("確定清除所有訓練紀錄？此動作無法復原。")){ S={...DEF}; save(); renderAll(); toast("已重置"); }
  }
});

/* ---------- 計時器 ---------- */
let tState={t:0,total:0,run:false,iv:null};
const ARC=678.58;
function openTimer(sec){
  clearInterval(tState.iv);
  tState={t:sec,total:sec,run:false,iv:null};   // 打開先暫停,不自動跑 → 可先調秒數再開始
  $("#timerOv").classList.add("show");
  paintTimer(); startLoop();
}
function paintTimer(){
  $("#tNum").textContent = tState.t>0 ? tState.t : "完成";
  $("#tNum").style.fontSize = tState.t>0 ? "" : "52px";
  const frac=tState.total?tState.t/tState.total:0;
  $("#tArc").style.strokeDashoffset = ARC*(1-Math.max(0,frac));
  const b=$("#tToggle");
  if(tState.run) b.textContent="暫停";
  else if(tState.t<=0) b.textContent="重新開始";
  else if(tState.t<tState.total) b.textContent="繼續";
  else b.textContent="開始";
}
function startLoop(){            // 單一常駐 loop,只在 run 時倒數;歸零不清除,讓 +秒數後能再開始
  clearInterval(tState.iv);
  tState.iv=setInterval(()=>{
    if(!tState.run) return;
    tState.t--;
    if(tState.t<=0){ tState.t=0; tState.run=false; paintTimer(); beep(); toast("休息結束 · 下一組！"); return; }
    paintTimer();
  },1000);
}
function toggleTimer(){
  if(tState.run){ tState.run=false; }                       // 暫停
  else { if(tState.t<=0) tState.t=tState.total; tState.run=true; }  // 開始/繼續/重新開始
  paintTimer();
}
function closeTimer(){ tState.run=false; clearInterval(tState.iv); $("#timerOv").classList.remove("show"); }
$("#tToggle").onclick=toggleTimer;
$(".tcircle").onclick=toggleTimer;                            // 點圓圈也能開始/暫停
$("#tReset").onclick=()=>{ tState.t=tState.total; tState.run=false; paintTimer(); };  // 重設→回滿,暫停
$("#tClose").onclick=closeTimer;
document.querySelectorAll("[data-add]").forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); tState.t=Math.max(0,tState.t+ +b.dataset.add); if(tState.t>tState.total)tState.total=tState.t; paintTimer(); });
$("#timerOv").onclick=e=>{ if(e.target.id==="timerOv") closeTimer(); };

function beep(){
  try{const a=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.2,0.4].forEach(d=>{const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=880;o.start(a.currentTime+d);g.gain.setValueAtTime(.3,a.currentTime+d);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d+.15);o.stop(a.currentTime+d+.15);});
  }catch(e){}
}

let toastT;
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2200); }

/* ---------- go ---------- */
renderAll();
</script>
